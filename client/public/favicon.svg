<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Gradients -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B" /> <!-- Deep Indigo-950 -->
      <stop offset="50%" stop-color="#311042" /> <!-- Deep Purple/Fuchsia -->
      <stop offset="100%" stop-color="#111827" /> <!-- Gray-900 -->
    </linearGradient>

    <!-- Document Gradient -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- Document Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Signature Gradient -->
    <linearGradient id="sigGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" /> <!-- Violet-500 -->
      <stop offset="50%" stop-color="#EC4899" /> <!-- Pink-500 -->
      <stop offset="100%" stop-color="#F43F5E" /> <!-- Rose-500 -->
    </linearGradient>

    <!-- Fold Gradient -->
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- A subtle inner border/glow for the background -->
  <rect x="4" y="4" width="504" height="504" rx="124" stroke="#ffffff" stroke-opacity="0.15" stroke-width="8" />

  <!-- Document Sheet -->
  <g filter="url(#glow)">
    <!-- Document Body -->
    <path d="M152 96h144l96 96v208c0 17.673-14.327 32-32 32H152c-17.673 0-32-14.327-32-32V128c0-17.673 14.327-32 32-32z" fill="url(#docGrad)" />
    
    <!-- Page Fold Flap -->
    <path d="M296 96v64c0 17.673 14.327 32 32 32h64z" fill="url(#foldGrad)" />
  </g>

  <!-- Document Lines -->
  <!-- Line 1 -->
  <rect x="168" y="240" width="160" height="12" rx="6" fill="#94A3B8" opacity="0.6" />
  <!-- Line 2 -->
  <rect x="168" y="276" width="120" height="12" rx="6" fill="#94A3B8" opacity="0.6" />

  <!-- Signature Stroke (Dynamic, smooth bezier curve) -->
  <path d="M152 370 c 25 -35, 50 -40, 75 5 c 20 35, 45 -55, 70 -15 c 20 32, 45 -40, 65 -10" 
        stroke="url(#sigGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Stylized Pen Nib -->
  <g transform="translate(362, 350) rotate(45)">
    <!-- Pen Tip -->
    <path d="M 0 0 L -6 12 L 6 12 Z" fill="#F59E0B" />
    <!-- Pen Body -->
    <path d="M -6 12 L -6 48 C -6 50, 6 50, 6 48 L 6 12 Z" fill="#1E293B" />
    <!-- Pen Accent Ring -->
    <rect x="-6" y="18" width="12" height="4" fill="#F59E0B" />
  </g>
</svg>